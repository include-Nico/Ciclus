<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ciclus - Bike Dashboard</title>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Contenitore Mappa Full-Screen -->
    <div id="map"></div>

    <!-- Dashboard Glassmorphism -->
    <div id="dashboard" class="glass-panel">
        
        <!-- Tachimetro Ibrido (Analogico + Digitale) -->
        <div class="speedometer-wrapper">
            <!-- Struttura SVG del quadrante -->
            <svg class="speed-gauge" viewBox="0 0 200 200">
                <!-- Anello dei Ticks (Decorativo hi-tech) -->
                <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="2 10" />
                
                <!-- Sfondo della barra tachimetro (270 gradi) -->
                <!-- stroke-dasharray="330 440" crea un arco preciso calcolato matematicamente -->
                <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(0, 0, 0, 0.6)" stroke-width="12" stroke-linecap="round" stroke-dasharray="330 440" transform="rotate(135 100 100)" />
                
                <!-- Barra del progresso della velocità (Blu Neon) -->
                <circle id="speedProgress" cx="100" cy="100" r="70" fill="none" stroke="#007bff" stroke-width="12" stroke-linecap="round" stroke-dasharray="330 440" stroke-dashoffset="330" transform="rotate(135 100 100)" style="transition: stroke-dashoffset 0.5s ease-out;" />
                
                <!-- Lancetta (Rossa) e perno centrale -->
                <g id="speedNeedle" style="transform-origin: 100px 100px; transform: rotate(-135deg); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                    <polygon points="97,100 103,100 100,25" fill="#ff3b30" />
                    <circle cx="100" cy="100" r="8" fill="#121212" stroke="#ff3b30" stroke-width="3" />
                </g>
            </svg>

            <!-- Valore Digitale sovrapposto al centro -->
            <div class="speed-digital">
                <span id="currentSpeed">0.0</span>
                <span class="unit">km/h</span>
            </div>
        </div>

        <!-- Griglia Statistiche Secondarie -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">DISTANZA</span>
                <div class="stat-value"><span id="distance">0.00</span> <span class="unit-small">km</span></div>
            </div>
            <div class="stat-card">
                <span class="stat-label">TEMPO</span>
                <div class="stat-value"><span id="timer">00:00:00</span></div>
            </div>
            <div class="stat-card">
                <span class="stat-label">MAX VEL.</span>
                <div class="stat-value"><span id="maxSpeed">0.0</span> <span class="unit-small">km/h</span></div>
            </div>
            <div class="stat-card">
                <span class="stat-label">PRECISIONE</span>
                <div class="stat-value"><span id="accuracy">--</span> <span class="unit-small">m</span></div>
            </div>
        </div>

        <button id="startBtn" class="glass-btn">INIZIA CORSA</button>
    </div>

    <!-- Leaflet.js JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>

</body>
</html>
