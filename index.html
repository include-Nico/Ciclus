<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="app_title">Ciclus</title>
  <link rel="manifest" href="/manifest.json">
</head>
<body>
  <main>
    <h1 data-i18n="welcome_message">Benvenuto</h1>
    <p data-i18n="description">Questa è la tua app offline e multilingua.</p>
  </main>

  <!-- Banner Player Musicale -->
  <div id="music-banner" class="music-banner">
    <div class="track-info">
      <span id="track-name">Nessuna traccia</span>
    </div>
    <div class="controls">
      <button id="btn-prev">⏮️</button>
      <button id="btn-play">▶️</button>
      <button id="btn-next">⏭️</button>
    </div>
  </div>

  <!-- Vite inietta automaticamente i moduli da qui -->
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
